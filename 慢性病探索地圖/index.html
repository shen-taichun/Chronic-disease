function updateMarkerSizes(){const scale=$('#mapFrame').clientWidth/1680;[...diseaseHalls,consultationGate].forEach(h=>{const el=document.querySelector(`[data-hall="${h.id}"]`);if(el){el.style.width=h.radius*2*scale+'px';el.style.height=h.radius*2*scale+'px'}})}
function detectNearby(){const frame=$('#mapFrame'),scale=frame.clientWidth/1680,px=playerPosition.x/100*frame.clientWidth,py=playerPosition.y/100*frame.clientHeight;let nearest=null,best=Infinity;[...diseaseHalls,consultationGate].forEach(h=>{const dx=px-h.x/100*frame.clientWidth,dy=py-h.y/100*frame.clientHeight,d=Math.hypot(dx,dy);if(d<h.radius*scale+28&&d<best){nearest=h;best=d}});nearbyHall=nearest;$$('.hall-marker').forEach(m=>m.classList.toggle('near',nearbyHall&&m.dataset.hall===nearbyHall.id));if(!nearbyHall){$('#prompt').classList.remove('show');return}$('#promptTitle').textContent=`你來到了${nearbyHall.name}！`;if(nearbyHall.isGate){$('#promptText').textContent='帶著五枚徽章，試著開啟健康諮詢大門。';$('#challenge').textContent='開啟大門'}else if(completedHalls[nearbyHall.id]){$('#promptText').textContent=`你已獲得「${nearbyHall.badge}」，仍可再次挑戰。`;$('#challenge').textContent='再次挑戰'}else{$('#promptText').textContent=`要進入${nearbyHall.name}挑戰嗎？按 Enter 也可以進入。`;$('#challenge').textContent='進入挑戰'}$('#prompt').classList.add('show')}
function moveLoop(now){const dt=Math.min((now-lastTime)/1000,.05);lastTime=now;let dx=0,dy=0;if(pressed.has('left'))dx--;if(pressed.has('right'))dx++;if(pressed.has('up'))dy--;if(pressed.has('down'))dy++;if(dx||dy){const len=Math.hypot(dx,dy);playerPosition.x=Math.max(BOUNDS.left,Math.min(BOUNDS.right,playerPosition.x+dx/len*MOVE_SPEED*dt));playerPosition.y=Math.max(BOUNDS.top,Math.min(BOUNDS.bottom,playerPosition.y+dy/len*MOVE_SPEED*dt));$('#player').style.left=playerPosition.x+'%';$('#player').style.top=playerPosition.y+'%';$('#player').classList.add('walking');detectNearby()}else $('#player').classList.remove('walking');requestAnimationFrame(moveLoop)}
const keyMap={ArrowUp:'up',w:'up',W:'up',ArrowDown:'down',s:'down',S:'down',ArrowLeft:'left',a:'left',A:'left',ArrowRight:'right',d:'right',D:'right'};
document.addEventListener('keydown',e=>{if(keyMap[e.key]){e.preventDefault();pressed.add(keyMap[e.key])}if(e.key==='Enter'&&nearbyHall&&!$('#modal').classList.contains('open'))activateNearby()});document.addEventListener('keyup',e=>{if(keyMap[e.key])pressed.delete(keyMap[e.key])});window.addEventListener('blur',()=>pressed.clear());
$$('.dpad button[data-dir]').forEach(btn=>{const start=e=>{e.preventDefault();pressed.add(btn.dataset.dir);btn.classList.add('active')},stop=()=>{pressed.delete(btn.dataset.dir);btn.classList.remove('active')};btn.addEventListener('pointerdown',start);btn.addEventListener('pointerup',stop);btn.addEventListener('pointercancel',stop);btn.addEventListener('pointerleave',stop)});

function drop(id,slot){const h=diseaseHalls.find(x=>x.id===id);if(!h||placed.has(id))return;if(slot.dataset.slot===id){placed.add(id);slot.classList.add('correct');slot.innerHTML=`<strong>${h.name}</strong><img src="${h.badgeImg}" alt="${h.badge}" style="width:72px;height:72px;object-fit:cover;border-radius:50%;border:4px solid white">`;document.querySelector(`.credential[data-id="${id}"]`)?.classList.add('placed');$('#matched').textContent=placed.size;if(placed.size===5)setTimeout(victory,500)}else{slot.classList.add('wrong');setTimeout(()=>slot.classList.remove('wrong'),420)}}
function bindDrag(){$$('.credential').forEach(el=>{el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',el.dataset.id);el.classList.add('dragging')});el.addEventListener('dragend',()=>el.classList.remove('dragging'));el.addEventListener('pointerdown',touchDrag)});$$('.slot').forEach(s=>{s.addEventListener('dragover',e=>{e.preventDefault();s.classList.add('over')});s.addEventListener('dragleave',()=>s.classList.remove('over'));s.addEventListener('drop',e=>{e.preventDefault();s.classList.remove('over');drop(e.dataTransfer.getData('text/plain'),s)})})}
function touchDrag(e){if(e.pointerType==='mouse')return;const el=e.currentTarget,ghost=el.querySelector('img').cloneNode();ghost.className='drag-ghost';document.body.appendChild(ghost);el.setPointerCapture(e.pointerId);const move=p=>{ghost.style.left=p.clientX+'px';ghost.style.top=p.clientY+'px';$$('.slot').forEach(s=>s.classList.remove('over'));document.elementFromPoint(p.clientX,p.clientY)?.closest('.slot')?.classList.add('over')};move(e);const end=p=>{const slot=document.elementFromPoint(p.clientX,p.clientY)?.closest('.slot');if(slot)drop(el.dataset.id,slot);$$('.slot').forEach(s=>s.classList.remove('over'));ghost.remove();el.removeEventListener('pointermove',move);el.removeEventListener('pointerup',end);el.removeEventListener('pointercancel',end)};el.addEventListener('pointermove',move);el.addEventListener('pointerup',end);el.addEventListener('pointercancel',end)}
function victory(){const start=Number(localStorage.getItem('adventure_start'))||Date.now(),sec=Math.max(0,Math.floor((Date.now()-start)/1000));$('#time').textContent=`總探索時長：${String(Math.floor(sec/60)).padStart(2,'0')} 分 ${String(sec%60).padStart(2,'0')} 秒`;$('#door').style.display='none';$('#victory').classList.add('show')}

$('#cover').onclick=dismissCover;$('#cover').onkeydown=e=>{if(e.key==='Enter'||e.key===' ')dismissCover()};$$('.character-card').forEach(c=>c.onclick=()=>selectCharacter(c.dataset.character));$('#avatar').onclick=showCharacterSelect;$('#challenge').onclick=activateNearby;$('#home').onclick=showHome;$('#sound').onclick=e=>{e.currentTarget.textContent=e.currentTarget.textContent.includes('🔊')?'🔇 音效':'🔊 音效'};$('#close').onclick=()=>$('#modal').classList.remove('open');$('#modal').onclick=e=>{if(e.target===$('#modal'))$('#modal').classList.remove('open')};$('#again').onclick=restart;$('#enterConsult').onclick=()=>location.href='../全方位醫療資訊站/index.html';
function init(){if(!localStorage.getItem('adventure_start'))localStorage.setItem('adventure_start',Date.now());if(sessionStorage.getItem('map_cover_seen')){$('#cover').style.display='none';if(!selectedCharacter)showCharacterSelect()}applyCharacter();updateHUD();$('#mapImage').addEventListener('load',()=>{buildMarkers();detectNearby()});if($('#mapImage').complete){buildMarkers();detectNearby()}window.addEventListener('resize',updateMarkerSizes);requestAnimationFrame(moveLoop)}init();

class ParticleSystem{
  static burst(container,count=28){for(let i=0;i<count;i++){const p=document.createElement('i');p.className='particle';p.style.left=(15+Math.random()*70)+'%';p.style.top=(40+Math.random()*45)+'%';p.style.setProperty('--x',(Math.random()*180-90)+'px');p.style.setProperty('--d',(1.2+Math.random()*1.5)+'s');container.appendChild(p);setTimeout(()=>p.remove(),3000)}}
  static petals(container,count=28){for(let i=0;i<count;i++){const p=document.createElement('i');p.className='petal';p.style.left=Math.random()*100+'%';p.style.setProperty('--d',(5+Math.random()*5)+'s');p.style.setProperty('--delay',(-Math.random()*8)+'s');p.style.setProperty('--drift',(Math.random()*180-90)+'px');container.appendChild(p)}}

  static snap(el,slot){slot.classList.add('filled');el.classList.add('used');this.playSoftChime();CameraController.focus(slot);ParticleSystem.burst($('#treeParticles'),24)}
}

  init(){this.placed.clear();this.tree.className='health-tree';$('#treeQuote').classList.remove('show');$('#lightBeam').classList.remove('show');this.makeLeaves();$('#treeSlots').innerHTML=badgeData.map(b=>`<div class="tree-slot" data-tree-slot="${b.id}" aria-label="${b.hallLabel}徽章凹槽" style="left:${b.slot.x}%;top:${b.slot.y}%"><b class="slot-label">${b.hallLabel}</b><span class="slot-symbol">${b.icon}</span><small class="slot-guide">放入對應徽章</small></div><span class="health-value" data-value="${b.id}" style="left:${b.slot.x-6}%;top:${b.slot.y+16}%">${b.value}</span>`).join('');$('#treeBag').innerHTML=badgeData.map(b=>`<div class="tree-badge" draggable="true" data-tree-badge="${b.id}"><img src="${b.img}" alt="${b.name}"><span>${b.name}</span></div>`).join('');this.bind()}

class BadgeDragManager{
  constructor(placement){this.placement=placement;this.drag=null}
  bind(){document.querySelectorAll('.ritual-badge').forEach(el=>{el.draggable=false;el.addEventListener('pointerdown',e=>this.handleBadgeDragStart(e,el))})}
  handleBadgeDragStart(e,el){
    if(el.classList.contains('used'))return;e.preventDefault();
    const rect=el.getBoundingClientRect(),centerOffsetX=rect.width/2,centerOffsetY=rect.height/2;
    const ghost=el.cloneNode(true);ghost.removeAttribute('draggable');ghost.className='badge-drag-ghost';ghost.style.left=`${e.clientX-centerOffsetX}px`;ghost.style.top=`${e.clientY-centerOffsetY}px`;document.body.appendChild(ghost);

  }
  handlePointerMove(e,ghost,centerOffsetX,centerOffsetY){ghost.style.left=`${e.clientX-centerOffsetX}px`;ghost.style.top=`${e.clientY-centerOffsetY}px`;const target=this.dropZoneAtGhostCenter(ghost);document.querySelectorAll('.disease-card').forEach(c=>c.classList.toggle('over',c===target))}
  dropZoneAtGhostCenter(ghost){const badgeRect=ghost.getBoundingClientRect(),badgeCenterX=badgeRect.left+badgeRect.width/2,badgeCenterY=badgeRect.top+badgeRect.height/2;return[...document.querySelectorAll('.disease-card')].find(zone=>{const r=zone.getBoundingClientRect();return badgeCenterX>=r.left&&badgeCenterX<=r.right&&badgeCenterY>=r.top&&badgeCenterY<=r.bottom})||null}
  handlePointerEnd(e,el,ghost,move,end){const target=this.dropZoneAtGhostCenter(ghost),badgeId=el.dataset.badgeId;if(target)this.handleBadgeDrop(badgeId,target);ghost.remove();el.classList.remove('dragging');document.querySelectorAll('.disease-card').forEach(c=>c.classList.remove('drag-ready','over'));el.removeEventListener('pointermove',move);el.removeEventListener('pointerup',end);el.removeEventListener('pointercancel',end);this.drag=null}
  handleBadgeDrop(badgeId,target){this.placement.handleBadgeDrop(badgeId,target)}
}
class BadgePlacementManager{
  constructor(onComplete){this.onComplete=onComplete;this.placed=new Set();this.values=new HealthValueManager();this.dragger=new BadgeDragManager(this);this.sentence=null}
  initBadgePlacement(){this.placed.clear();$('#treeQuote').classList.remove('show');$('#lightBeam').classList.remove('show');$('#matchHint').textContent='拖曳一枚徽章，尋找它真正的位置。';$('#diseaseSlots').innerHTML=badgeMatchData.map(x=>`<article class="disease-card" data-disease-id="${x.diseaseId}"><span class="disease-icon">${x.icon}</span><h3>${x.diseaseName}</h3><div class="badge-well"><span>＋</span></div></article>`).join('');$('#ritualBag').innerHTML=badgeMatchData.map(x=>`<div class="ritual-badge" draggable="true" data-badge-id="${x.badgeId}"><img src="${x.imagePath}" alt="${x.badgeName}"><span>${x.badgeName}</span></div>`).join('');this.values.reset();this.dragger.bind()}
  checkBadgeMatch(badgeId,diseaseId){const data=badgeMatchData.find(x=>x.badgeId===badgeId);return !!data&&data.diseaseId===diseaseId}
  handleBadgeDrop(badgeId,target){const diseaseId=target.dataset.diseaseId;if(!this.checkBadgeMatch(badgeId,diseaseId)){target.classList.add('gentle-wrong');$('#matchHint').textContent='這枚徽章好像還沒找到真正的位置。';setTimeout(()=>target.classList.remove('gentle-wrong'),430);return}if(this.placed.has(diseaseId))return;const data=badgeMatchData.find(x=>x.diseaseId===diseaseId),source=document.querySelector(`[data-badge-id="${badgeId}"]`);this.placed.add(diseaseId);target.classList.add('placed');target.querySelector('.badge-well').innerHTML=`<img src="${data.imagePath}" alt="${data.badgeName}">`;source.classList.add('used');BadgeAnimation.playSoftChime();ParticleSystem.burst($('#treeParticles'),26);CameraController.focus(target);this.showHealthValue(diseaseId);$('#matchHint').textContent=`「${data.badgeName}」已找到位置！`;this.checkAllBadgesPlaced()}
  showHealthValue(diseaseId){this.values.showHealthValue(diseaseId)}
  checkAllBadgesPlaced(){if(this.placed.size!==badgeMatchData.length)return;document.querySelectorAll('.disease-card,.badge-well').forEach(x=>x.classList.add('all-glow'));document.querySelectorAll('.value-card').forEach(x=>x.classList.add('show'));$('#matchHint').textContent='五枚徽章全部歸位，健康價值正在凝聚……';ParticleSystem.burst($('#treeParticles'),55);setTimeout(()=>this.values.converge(),900);this.sentence=new FinalSentenceManager(new TransitionManager(this.onComplete));this.sentence.playFinalSentenceAnimation()}
}
/* 流程函式保留為全域入口，方便後續教學或擴充。 */
function initBadgePlacement(){FinalChapter.placement.initBadgePlacement()}
function handleBadgeDragStart(event,element){FinalChapter.placement.dragger.handleBadgeDragStart(event,element)}
function handleBadgeDrop(badgeId,target){FinalChapter.placement.handleBadgeDrop(badgeId,target)}
function checkBadgeMatch(badgeId,diseaseId){return FinalChapter.placement.checkBadgeMatch(badgeId,diseaseId)}
function showHealthValue(diseaseId){FinalChapter.placement.showHealthValue(diseaseId)}
function checkAllBadgesPlaced(){FinalChapter.placement.checkAllBadgesPlaced()}
function playFinalSentenceAnimation(){FinalChapter.placement.sentence?.playFinalSentenceAnimation()}
function transitionToEndingCutscene(){FinalChapter.cutscene.start()}
function startEndingCutscene(){FinalChapter.cutscene.start()}

class BadgeFusionAnimation{
  animateBadgesFlyIn(scene){scene.querySelectorAll('.fusion-badge').forEach(b=>b.classList.add('fusion-playing'))}
  animateBadgesCircle(scene){scene.classList.add('badges-circling')}
  animateBadgesMerge(scene){scene.classList.add('badges-merging')}
  play(scene){this.animateBadgesFlyIn(scene);setTimeout(()=>this.animateBadgesCircle(scene),1700);setTimeout(()=>this.animateBadgesMerge(scene),3800)}
}
class GuardianBadgeAnimation{
  showGuardianBadge(scene){scene.querySelector('.fusion-guardian')?.classList.add('guardian-reveal')}
  playGuardianNarration(scene,text,dialogue){const box=scene.querySelector('.dialogue');if(box)dialogue.type(box,text)}
  play(scene,text,dialogue){this.showGuardianBadge(scene);this.playGuardianNarration(scene,text,dialogue)}
}
const badgeFusionAnimation=new BadgeFusionAnimation(),guardianBadgeAnimation=new GuardianBadgeAnimation();
function animateBadgesFlyIn(){const s=document.querySelector('[data-scene="fusion"]');if(s)badgeFusionAnimation.animateBadgesFlyIn(s)}
function animateBadgesCircle(){const s=document.querySelector('[data-scene="fusion"]');if(s)badgeFusionAnimation.animateBadgesCircle(s)}
function animateBadgesMerge(){const s=document.querySelector('[data-scene="fusion"]');if(s)badgeFusionAnimation.animateBadgesMerge(s)}
function showGuardianBadge(){const s=document.querySelector('[data-scene="fusion"]');if(s)guardianBadgeAnimation.showGuardianBadge(s)}
function playGuardianNarration(){const s=document.querySelector('[data-scene="fusion"]'),d=cutsceneData.find(x=>x.id==='fusion');if(s&&d)guardianBadgeAnimation.playGuardianNarration(s,d.text,FinalChapter.cutscene.dialogue)}
function playBadgeFusionScene(){const c=FinalChapter.cutscene;$('#finalChapter').classList.add('active');$('#treeStage').classList.remove('active');$('#cutscene').classList.add('active');c.scenes.build();c.scenes.show('fusion',cutsceneData.find(x=>x.id==='fusion').text)}

class SceneManager{
  constructor(host,dialogue){this.host=host;this.dialogue=dialogue}
  build(){
    const starts=[[-340,-230],[340,-230],[-340,200],[340,200],[0,225]],circles=[[0,-145],[138,-45],[85,105],[-85,105],[-138,-45]];
    this.host.innerHTML=`<article class="scene scene-patients" data-scene="patients"><div class="patient-group">${diseaseHallData.map(h=>`<div class="patient-card ${h.id==='cancer'?'cancer-card':''}"><div class="patient-image-wrapper"><img class="patient-image ${h.id==='cancer'?'cancer-patient':h.id}" src="${h.patient}" alt="${h.name}病人"></div></div>`).join('')}</div><div class="fc-particles"></div><div class="dialogue"></div></article><article class="scene scene-fusion" data-scene="fusion"><div class="fusion-arena">${badgeMatchData.map((b,i)=>`<img class="fusion-badge" src="${b.imagePath}" alt="${b.badgeName}" style="--delay:${i*.13}s;--start-x:${starts[i][0]}px;--start-y:${starts[i][1]}px;--circle-x:${circles[i][0]}px;--circle-y:${circles[i][1]}px">`).join('')}<i class="fusion-flare"></i><img class="fusion-guardian" src="assets/badges/guardian-badge.png" alt="健康守護者徽章"></div><div class="fc-particles"></div><div class="dialogue"></div></article><article class="scene final-scene" data-scene="final"><div class="birds">⌁⌁⌁</div><div class="final-content"><img class="guardian-badge" src="assets/badges/guardian-badge.png" alt="健康守護者徽章"><h2 class="gold-title">恭喜成為<br>健康守護者</h2><p class="final-copy">你完成了五座主題館。獲得五枚健康徽章。\n真正的冒險，才從每天的生活開始。\n\n今天開始，請把照顧自己的習慣，帶回真實生活。</p><div class="commitment">${CommitmentCardManager.render()}</div><div class="final-actions"><button data-final="restart">重新探索</button><button data-final="health">健康數值資訊站</button><button data-final="home">回到首頁</button></div></div></article>`;
    ParticleSystem.petals(this.host.querySelector('.final-scene'));ParticleSystem.burst(this.host.querySelector('[data-scene="patients"] .fc-particles'),45);ParticleSystem.burst(this.host.querySelector('[data-scene="fusion"] .fc-particles'),70)
  }
  show(id,text){$$('.scene').forEach(s=>s.classList.remove('active','leaving'));const scene=this.host.querySelector(`[data-scene="${id}"]`);scene.classList.add('active');if(id==='fusion'){badgeFusionAnimation.play(scene);guardianBadgeAnimation.play(scene,text,this.dialogue)}else{const box=scene.querySelector('.dialogue');if(box)this.dialogue.type(box,text)}}
}
class CutsceneManager{
  constructor(){this.index=0;this.timer=null;this.dialogue=new DialogueManager();this.scenes=new SceneManager($('#sceneHost'),this.dialogue)}
  start(){this.index=0;this.scenes.build();$('#treeStage').classList.remove('active');$('#cutscene').classList.add('active');this.play()}
  play(){clearTimeout(this.timer);const data=cutsceneData[this.index];this.scenes.show(data.id,data.text);if(data.id==='final'){localStorage.setItem('final_chapter_completed','1');this.bindFinalButtons();return}this.timer=setTimeout(()=>this.next(),data.duration)}
  next(){if(this.index>=cutsceneData.length-1)return;this.index++;this.play()}
  bindFinalButtons(){const host=$('#sceneHost');host.querySelector('[data-final="restart"]').onclick=e=>{e.stopPropagation();localStorage.clear();sessionStorage.clear();location.reload()};host.querySelector('[data-final="health"]').onclick=e=>{e.stopPropagation();location.href='../全方位醫療資訊站/index.html'};host.querySelector('[data-final="home"]').onclick=e=>{e.stopPropagation();$('#finalChapter').classList.remove('active');showHome()}}
}
class CutsceneInput{constructor(manager){this.manager=manager;$('#cutscene').onclick=e=>{if(!e.target.closest('button'))manager.next()};document.addEventListener('keydown',e=>{if($('#cutscene').classList.contains('active')&&(e.key==='Enter'||e.key===' ')){e.preventDefault();manager.next()}})}}
class FinalChapterController{
  constructor(){this.cutscene=new CutsceneManager();new CutsceneInput(this.cutscene);this.placement=new BadgePlacementManager(()=>startEndingCutscene())}
  start(){pressed.clear();$('#modal').classList.remove('open');$('#finalChapter').classList.add('active');$('#cutscene').classList.remove('active');$('#treeStage').classList.add('active');this.placement.initBadgePlacement();ParticleSystem.burst($('#treeParticles'),25)}
  autoStart(){const ready=badgeData.every(b=>completedHalls[b.id]);if(!ready||localStorage.getItem('final_chapter_completed'))return;const coverHidden=$('#cover').style.display==='none'||$('#cover').classList.contains('hide'),choosing=$('#characterSelect').classList.contains('show');if(coverHidden&&!choosing)this.start();else setTimeout(()=>this.autoStart(),700)}
}
const FinalChapter=new FinalChapterController();
/* 集滿五枚才進入健康之樹；不足時仍開啟原本的徽章提示門。 */
const LegacyDoor=window.openDoor;
window.openDoor=()=>badgeData.every(b=>completedHalls[b.id])?FinalChapter.start():LegacyDoor();
window.startFinalChapter=()=>FinalChapter.start();
setTimeout(()=>FinalChapter.autoStart(),900);
</script></body></html>
