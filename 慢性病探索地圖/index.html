<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>慢性病探索｜角色冒險地圖</title>
<style>
:root{--ink:#2e3b50;--navy:#294c70;--mint:#61c9a6;--green:#3db67a;--yellow:#f4c85c;--red:#de6670;--paper:#fffdf8}*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;color:var(--ink)}body{background:#172a27;overflow:hidden}button{font:inherit}.cover{position:fixed;inset:0;z-index:1000;display:grid;place-items:center;background:#183b32;cursor:pointer;transition:opacity .55s}.cover.hide{opacity:0;pointer-events:none}.cover img{width:100%;height:100%;object-fit:cover}.cover-hint{position:absolute;left:50%;bottom:5%;transform:translateX(-50%);padding:11px 20px;border-radius:99px;background:#1d3348dc;color:#fff;font-weight:1000;white-space:nowrap;box-shadow:0 6px 0 #10223699;animation:pulse 1.25s ease-in-out infinite alternate}@keyframes pulse{to{transform:translate(-50%,-5px)}}
.character-select{position:fixed;inset:0;z-index:900;display:none;place-items:center;padding:22px;background:linear-gradient(145deg,#dff7edee,#e8f1ffee);backdrop-filter:blur(10px)}.character-select.show{display:grid;animation:fade .3s}.select-panel{width:min(760px,100%);padding:30px;border:5px solid #fff;border-radius:32px;background:#fffdf8;box-shadow:0 12px 0 #a9c4c5,0 25px 65px #1a344344;text-align:center}.select-panel h1{font-size:clamp(29px,5vw,44px);margin:0 0 7px}.select-panel>p{color:#687586;margin:0 0 22px}.character-cards{display:grid;grid-template-columns:1fr 1fr;gap:20px}.character-card{border:4px solid #e0e9e9;border-radius:25px;padding:15px;background:#f8fbfa;cursor:pointer;transition:.18s;box-shadow:0 7px 0 #ccd8d9}.character-card:hover,.character-card:focus-visible{transform:translateY(-6px);border-color:#71c9ab;background:#eaf9f3}.character-card img{display:block;width:100%;height:245px;object-fit:cover;object-position:center;border-radius:18px;mix-blend-mode:multiply}.character-card strong{display:block;font-size:22px;margin:10px 0 3px}.character-card span{color:#71808c;font-size:14px}
.map-screen{min-height:100vh;display:grid;place-items:center;padding:8px;background:radial-gradient(circle,#36584d,#152a27)}.map-frame{position:relative;display:inline-block;line-height:0;filter:drop-shadow(0 18px 36px #0008)}.map-image{display:block;width:auto;height:auto;max-width:calc(100vw - 16px);max-height:calc(100vh - 16px);object-fit:contain}.hud{position:fixed;z-index:30;left:14px;top:12px;max-width:min(620px,72vw);display:flex;align-items:center;gap:9px;padding:8px 11px;border:3px solid #fff;border-radius:18px;background:#fffdf1ed;box-shadow:0 6px 0 #5e4836aa,0 10px 23px #0004;line-height:1.2;backdrop-filter:blur(5px)}.avatar{width:47px;height:47px;object-fit:cover;object-position:center;border-radius:50%;border:3px solid #fff;background:#edf5ef;mix-blend-mode:multiply;cursor:pointer}.held{font-weight:1000;color:#266c52;white-space:nowrap}.badge-list{display:flex;gap:4px}.mini-badge{width:29px;height:29px;object-fit:cover;border:2px solid #fff;border-radius:50%;box-shadow:0 2px 0 #9ba9a9}.no-badge{font-size:12px;color:#75808b}.top-actions{position:fixed;z-index:31;right:14px;top:12px;display:flex;gap:8px}.ui-btn{border:3px solid #fff;border-radius:14px;padding:9px 12px;background:#314f69;color:#fff;font-weight:900;cursor:pointer;box-shadow:0 5px 0 #172e43}.ui-btn:hover{transform:translateY(-2px)}
.hall-marker{position:absolute;z-index:4;transform:translate(-50%,-50%);border:2px solid transparent;border-radius:50%;pointer-events:none;transition:.2s}.hall-marker.near{border-color:#fff2a1;background:#fff3a226;box-shadow:0 0 18px 8px #ffe98299,inset 0 0 25px #fff5b355;animation:glow 1s ease-in-out infinite alternate}@keyframes glow{to{transform:translate(-50%,-50%) scale(1.1)}}.map-badge{position:absolute;right:-7px;top:-7px;width:38px;height:38px;object-fit:cover;border:4px solid #fff;border-radius:50%;box-shadow:0 4px 0 #377458,0 7px 12px #0005}.player{position:absolute;z-index:15;width:clamp(82px,7vw,112px);height:clamp(105px,8.6vw,138px);object-fit:cover;object-position:center;transform:translate(-50%,-82%);mix-blend-mode:multiply;filter:drop-shadow(0 6px 4px #263a3166);pointer-events:none}.player.walking{animation:walk .34s ease-in-out infinite alternate}@keyframes walk{to{transform:translate(-50%,-85%) scale(1.035) rotate(1.5deg)}}
.prompt{position:fixed;z-index:40;left:50%;bottom:18px;transform:translateX(-50%) translateY(130%);width:min(620px,calc(100vw - 26px));display:flex;align-items:center;justify-content:space-between;gap:16px;padding:15px 18px;border:4px solid #fff;border-radius:21px;background:#fffdf4f2;box-shadow:0 8px 0 #816d4baa,0 15px 28px #0004;line-height:1.5;transition:.25s;pointer-events:none}.prompt.show{transform:translateX(-50%) translateY(0);pointer-events:auto}.prompt strong{display:block;font-size:18px}.prompt span{color:#647181;font-size:13px}.enter-btn{flex:none;border:0;padding:11px 15px;border-radius:13px;background:var(--green);color:#fff;font-weight:1000;cursor:pointer;box-shadow:0 5px 0 #267b55}.dpad{position:fixed;z-index:35;left:18px;bottom:17px;width:150px;height:150px;display:grid;grid-template:repeat(3,1fr)/repeat(3,1fr);gap:4px;filter:drop-shadow(0 6px 7px #0005)}.dpad button{border:3px solid #fff;border-radius:15px;background:#294c70dd;color:#fff;font-size:24px;font-weight:1000;touch-action:none;user-select:none;cursor:pointer}.dpad button:active,.dpad button.active{background:#4fae91;transform:scale(.94)}.d-up{grid-area:1/2}.d-left{grid-area:2/1}.d-center{grid-area:2/2;background:#fff9!important;pointer-events:none}.d-right{grid-area:2/3}.d-down{grid-area:3/2}
.modal{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:22px;background:#14263cbd;backdrop-filter:blur(8px);line-height:normal}.modal.open{display:flex;animation:fade .22s}@keyframes fade{from{opacity:0}}.panel{position:relative;width:min(980px,100%);max-height:92vh;overflow:auto;padding:31px;border:5px solid #fff;border-radius:32px;background:var(--paper);box-shadow:0 13px 0 #91aab2,0 28px 70px #10203066}.close{position:absolute;z-index:2;right:16px;top:14px;width:41px;height:41px;border:0;border-radius:50%;background:#e9f0f1;color:#667482;font-size:24px;cursor:pointer}.panel-head{text-align:center}.panel-head h2{font-size:32px;margin:0 0 7px}.panel-head p{margin:0;color:#687586}.slots{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:25px 0}.slot{min-height:145px;padding:12px 7px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:3px dashed #b9c9ce;border-radius:18px;background:#edf3f4;color:#687684;transition:.15s}.slot strong{font-size:13px;margin-bottom:8px}.hole{width:68px;height:68px;display:grid;place-items:center;border-radius:50%;background:#d7e1e3;box-shadow:inset 0 5px 7px #73889233;color:#87959b;font-size:27px}.slot.over{border-color:#4aa5cc;background:#e9f7fc}.slot.correct{border-style:solid;border-color:#61c79f;background:#e3f8ee;color:#247259}.slot.wrong{animation:wrong .38s;background:#ffe4e7;border-color:var(--red)}@keyframes wrong{25%,75%{transform:translateX(-7px)}50%{transform:translateX(7px)}}.bag{padding:19px;border-radius:21px;background:#f7f1df;border:3px solid #ead79e}.bag h3{margin:0 0 13px}.badges{display:flex;gap:14px;flex-wrap:wrap;min-height:105px}.credential{width:92px;touch-action:none;user-select:none;cursor:grab;text-align:center;font-size:11px;font-weight:900}.credential img{display:block;width:76px;height:76px;margin:0 auto 5px;object-fit:cover;border:5px solid #fff;border-radius:50%;box-shadow:0 5px 0 #afbdbe}.credential.dragging{opacity:.4}.credential.placed{display:none}.empty{color:#7e847f;padding:20px}.door-progress{text-align:center;margin-top:18px;font-weight:900}.door-progress b{color:#238369;font-size:20px}.victory{display:none;text-align:center;padding:12px}.victory.show{display:block;animation:pop .55s cubic-bezier(.2,.9,.25,1.2)}@keyframes pop{from{opacity:0;transform:scale(.75)}}.trophy{display:block;font-size:85px}.victory h2{font-size:38px;margin:5px 0}.time{display:inline-block;margin:12px;padding:10px 16px;border-radius:99px;background:#e4f7ef;color:#246d59;font-weight:1000}.victory-actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}.btn{border:0;padding:13px 21px;border-radius:15px;font-weight:1000;cursor:pointer}.enter{background:var(--green);color:#fff;box-shadow:0 5px 0 #287e58}.again{background:#fff0c8;color:#765c1e;box-shadow:0 5px 0 #ddc26e}.drag-ghost{position:fixed;z-index:999;pointer-events:none;width:78px;height:78px;object-fit:cover;border:5px solid #fff;border-radius:50%;box-shadow:0 10px 25px #0005;transform:translate(-50%,-50%)}
@media(max-width:780px){.hud{left:7px;top:7px;max-width:68vw;padding:6px}.avatar{width:40px;height:40px}.held{font-size:13px}.mini-badge{width:23px;height:23px}.top-actions{right:7px;top:7px}.ui-btn{padding:7px 9px;font-size:12px}.dpad{left:10px;bottom:10px;width:125px;height:125px}.prompt{bottom:12px;padding:12px 14px}.slots{grid-template-columns:repeat(3,1fr)}.panel{padding:26px 17px}}@media(max-width:520px){.character-cards{grid-template-columns:1fr}.character-card img{height:190px}.select-panel{padding:20px}.badge-list{display:none}.dpad{width:112px;height:112px}.prompt{bottom:130px}.prompt strong{font-size:15px}.enter-btn{padding:9px}.slots{grid-template-columns:1fr 1fr}}@media(pointer:fine) and (min-width:900px){.dpad{opacity:.72}}@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition:none!important}}
.character-card img,.avatar,.player{mix-blend-mode:normal;opacity:1}</style></head><body>
<div class="cover" id="cover" role="button" tabindex="0"><img src="cover.png" alt="慢性病探索遊戲封面"><span class="cover-hint">點擊任何位置開始冒險</span></div>
<section class="character-select" id="characterSelect"><div class="select-panel"><h1>選擇你的探索角色</h1><p>和夥伴一起走訪五個疾病主題館，收集健康徽章！</p><div class="character-cards"><button class="character-card" data-character="girl"><img src="assets/girl.png" alt="女學生"><strong>女學生</strong><span>健康探索隊員</span></button><button class="character-card" data-character="boy"><img src="assets/boy.png" alt="男學生"><strong>男學生</strong><span>健康探索隊員</span></button></div></div></section>
<main class="map-screen"><div class="map-frame" id="mapFrame"><img class="map-image" id="mapImage" src="assets/explore-map.png" alt="慢性病探索地圖"><div id="markers"></div><img class="player" id="player" alt="玩家角色"></div></main>
<aside class="hud"><img class="avatar" id="avatar" alt="玩家頭像" title="點擊可更換角色"><div><div class="held" id="held">已收集徽章 0 / 5</div><div class="badge-list" id="badgeList"></div></div></aside><div class="top-actions"><button class="ui-btn" id="home">⌂ 返回首頁</button><button class="ui-btn" id="sound">🔊 音效</button></div>
<div class="dpad" aria-label="虛擬方向鍵"><button class="d-up" data-dir="up" aria-label="向上">↑</button><button class="d-left" data-dir="left" aria-label="向左">←</button><button class="d-center">✦</button><button class="d-right" data-dir="right" aria-label="向右">→</button><button class="d-down" data-dir="down" aria-label="向下">↓</button></div>
<div class="prompt" id="prompt"><div><strong id="promptTitle"></strong><span id="promptText"></span></div><button class="enter-btn" id="challenge">進入挑戰</button></div>
<div class="modal" id="modal" role="dialog" aria-modal="true"><div class="panel"><button class="close" id="close">×</button><div id="door"><div class="panel-head"><h2>🚪 健康諮詢大門</h2><p>集滿 5 枚徽章，並將它們拖曳到對應凹槽即可開門。</p></div><div class="slots" id="slots"></div><div class="bag"><h3>🎒 我的徽章背包</h3><div class="badges" id="bag"></div></div><div class="door-progress">已正確放入：<b id="matched">0</b> / 5</div></div><div class="victory" id="victory"><span class="trophy">🏆</span><h2>開啟健康評估！</h2><p>五枚徽章已經喚醒健康諮詢大門！</p><span class="time" id="time"></span><div class="victory-actions"><button class="btn enter" id="enterConsult">進入全方位諮詢站</button><button class="btn again" id="again">再次冒險</button></div></div></div></div>
<script>
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];

/* ===== 集中設定區：更換地圖後，只需修改 x、y、radius =====
   x/y 是地圖寬高百分比；radius 是以 1680px 原圖為基準的偵測半徑。 */
const diseaseHalls=[
 {id:'cancer',name:'癌症館',fullName:'癌症主題館',badge:'防癌偵查徽章',x:70.8,y:28.5,radius:82,href:'../癌症主題館/index.html',badgeImg:'../癌症主題館/防癌偵查徽章.png'},
 {id:'stroke',name:'腦中風館',fullName:'腦中風主題館',badge:'黃金救援徽章',x:26.2,y:51.0,radius:82,href:'../腦中風主題館/index.html',badgeImg:'../腦中風主題館/黃金救援徽章.png'},
 {id:'heart',name:'心臟病館',fullName:'心臟病主題館',badge:'護心行動徽章',x:33.2,y:29.0,radius:82,href:'../心臟病主題館/index.html',badgeImg:'../心臟病主題館/護心行動徽章.png'},
 {id:'diabetes',name:'糖尿病館',fullName:'糖尿病主題館',badge:'穩糖生活徽章',x:69.0,y:50.0,radius:82,href:'../糖尿病主題館/index.html',badgeImg:'../糖尿病主題館/穩糖生活徽章.png'},
 {id:'kidney',name:'腎臟病館',fullName:'腎臟病主題館',badge:'護腎守門徽章',x:34.0,y:73.0,radius:82,href:'../腎臟病主題館/index.html',badgeImg:'../腎臟病主題館/護腎守門徽章.png'}
];
const consultationGate={id:'consult',name:'全方位醫療諮詢站',x:70.0,y:75.0,radius:88,isGate:true};
const CHARACTERS={girl:{name:'女學生',src:'assets/girl.png'},boy:{name:'男學生',src:'assets/boy.png'}};
const MOVE_SPEED=18,BOUNDS={left:4,right:96,top:13,bottom:91};
let completedHalls={},selectedCharacter=localStorage.getItem('selectedCharacter'),nearbyHall=null;
let playerPosition={x:50,y:87},pressed=new Set(),lastTime=performance.now(),placed=new Set();
try{completedHalls=JSON.parse(localStorage.getItem('cert_dynasty')||'{}')||{}}catch{completedHalls={}}
try{playerPosition=JSON.parse(sessionStorage.getItem('playerPosition'))||playerPosition}catch{}

function dismissCover(){if($('#cover').classList.contains('hide'))return;sessionStorage.setItem('map_cover_seen','1');$('#cover').classList.add('hide');setTimeout(()=>{$('#cover').style.display='none';if(!selectedCharacter)showCharacterSelect()},560)}
function showCharacterSelect(){$('#characterSelect').classList.add('show')}
function selectCharacter(id){selectedCharacter=id;localStorage.setItem('selectedCharacter',id);$('#characterSelect').classList.remove('show');applyCharacter();updateHUD()}
function applyCharacter(){if(!CHARACTERS[selectedCharacter])return;$('#player').src=CHARACTERS[selectedCharacter].src;$('#avatar').src=CHARACTERS[selectedCharacter].src;$('#player').style.left=playerPosition.x+'%';$('#player').style.top=playerPosition.y+'%'}
function updateHUD(){const earned=diseaseHalls.filter(h=>completedHalls[h.id]);$('#held').textContent=`已收集徽章 ${earned.length} / 5`;$('#badgeList').innerHTML=earned.length?earned.map(h=>`<img class="mini-badge" src="${h.badgeImg}" title="${h.badge}" alt="${h.badge}">`).join(''):'<span class="no-badge">尚未取得徽章</span>'}
function buildMarkers(){const scale=()=>$('#mapFrame').clientWidth/1680;$('#markers').innerHTML=[...diseaseHalls,consultationGate].map(h=>`<div class="hall-marker" data-hall="${h.id}" style="left:${h.x}%;top:${h.y}%;width:${h.radius*2*scale()}px;height:${h.radius*2*scale()}px">${completedHalls[h.id]?`<img class="map-badge" src="${h.badgeImg}" alt="${h.badge}">`:''}</div>`).join('')}
function updateMarkerSizes(){const scale=$('#mapFrame').clientWidth/1680;[...diseaseHalls,consultationGate].forEach(h=>{const el=document.querySelector(`[data-hall="${h.id}"]`);if(el){el.style.width=h.radius*2*scale+'px';el.style.height=h.radius*2*scale+'px'}})}
function detectNearby(){const frame=$('#mapFrame'),scale=frame.clientWidth/1680,px=playerPosition.x/100*frame.clientWidth,py=playerPosition.y/100*frame.clientHeight;let nearest=null,best=Infinity;[...diseaseHalls,consultationGate].forEach(h=>{const dx=px-h.x/100*frame.clientWidth,dy=py-h.y/100*frame.clientHeight,d=Math.hypot(dx,dy);if(d<h.radius*scale+28&&d<best){nearest=h;best=d}});nearbyHall=nearest;$$('.hall-marker').forEach(m=>m.classList.toggle('near',nearbyHall&&m.dataset.hall===nearbyHall.id));if(!nearbyHall){$('#prompt').classList.remove('show');return}$('#promptTitle').textContent=`你來到了${nearbyHall.name}！`;if(nearbyHall.isGate){$('#promptText').textContent='帶著五枚徽章，試著開啟健康諮詢大門。';$('#challenge').textContent='開啟大門'}else if(completedHalls[nearbyHall.id]){$('#promptText').textContent=`你已獲得「${nearbyHall.badge}」，仍可再次挑戰。`;$('#challenge').textContent='再次挑戰'}else{$('#promptText').textContent=`要進入${nearbyHall.name}挑戰嗎？按 Enter 也可以進入。`;$('#challenge').textContent='進入挑戰'}$('#prompt').classList.add('show')}
function moveLoop(now){const dt=Math.min((now-lastTime)/1000,.05);lastTime=now;let dx=0,dy=0;if(pressed.has('left'))dx--;if(pressed.has('right'))dx++;if(pressed.has('up'))dy--;if(pressed.has('down'))dy++;if(dx||dy){const len=Math.hypot(dx,dy);playerPosition.x=Math.max(BOUNDS.left,Math.min(BOUNDS.right,playerPosition.x+dx/len*MOVE_SPEED*dt));playerPosition.y=Math.max(BOUNDS.top,Math.min(BOUNDS.bottom,playerPosition.y+dy/len*MOVE_SPEED*dt));$('#player').style.left=playerPosition.x+'%';$('#player').style.top=playerPosition.y+'%';$('#player').classList.add('walking');detectNearby()}else $('#player').classList.remove('walking');requestAnimationFrame(moveLoop)}
const keyMap={ArrowUp:'up',w:'up',W:'up',ArrowDown:'down',s:'down',S:'down',ArrowLeft:'left',a:'left',A:'left',ArrowRight:'right',d:'right',D:'right'};
document.addEventListener('keydown',e=>{if(keyMap[e.key]){e.preventDefault();pressed.add(keyMap[e.key])}if(e.key==='Enter'&&nearbyHall&&!$('#modal').classList.contains('open'))activateNearby()});document.addEventListener('keyup',e=>{if(keyMap[e.key])pressed.delete(keyMap[e.key])});window.addEventListener('blur',()=>pressed.clear());
$$('.dpad button[data-dir]').forEach(btn=>{const start=e=>{e.preventDefault();pressed.add(btn.dataset.dir);btn.classList.add('active')},stop=()=>{pressed.delete(btn.dataset.dir);btn.classList.remove('active')};btn.addEventListener('pointerdown',start);btn.addEventListener('pointerup',stop);btn.addEventListener('pointercancel',stop);btn.addEventListener('pointerleave',stop)});
function activateNearby(){if(!nearbyHall)return;if(nearbyHall.isGate)openDoor();else enterDiseaseHall(nearbyHall.id)}
/* 進入疾病館的統一入口：目前會記錄訊息並連到既有的病人主訴頁。 */
function enterDiseaseHall(diseaseId){const hall=diseaseHalls.find(h=>h.id===diseaseId);if(!hall)return;console.log(`進入：${hall.fullName}`);sessionStorage.setItem('playerPosition',JSON.stringify(playerPosition));location.href=hall.href}
function openDoor(){placed.clear();$('#door').style.display='block';$('#victory').classList.remove('show');$('#matched').textContent='0';$('#slots').innerHTML=diseaseHalls.map(h=>`<div class="slot" data-slot="${h.id}"><strong>${h.name}</strong><div class="hole">?</div></div>`).join('');const owned=diseaseHalls.filter(h=>completedHalls[h.id]);$('#bag').innerHTML=owned.length?owned.map(h=>`<div class="credential" draggable="true" data-id="${h.id}"><img src="${h.badgeImg}" alt="${h.badge}"><span>${h.badge}</span></div>`).join(''):'<span class="empty">背包目前是空的，先去探索疾病主題館吧！</span>';bindDrag();$('#modal').classList.add('open')}
function drop(id,slot){const h=diseaseHalls.find(x=>x.id===id);if(!h||placed.has(id))return;if(slot.dataset.slot===id){placed.add(id);slot.classList.add('correct');slot.innerHTML=`<strong>${h.name}</strong><img src="${h.badgeImg}" alt="${h.badge}" style="width:72px;height:72px;object-fit:cover;border-radius:50%;border:4px solid white">`;document.querySelector(`.credential[data-id="${id}"]`)?.classList.add('placed');$('#matched').textContent=placed.size;if(placed.size===5)setTimeout(victory,500)}else{slot.classList.add('wrong');setTimeout(()=>slot.classList.remove('wrong'),420)}}
function bindDrag(){$$('.credential').forEach(el=>{el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',el.dataset.id);el.classList.add('dragging')});el.addEventListener('dragend',()=>el.classList.remove('dragging'));el.addEventListener('pointerdown',touchDrag)});$$('.slot').forEach(s=>{s.addEventListener('dragover',e=>{e.preventDefault();s.classList.add('over')});s.addEventListener('dragleave',()=>s.classList.remove('over'));s.addEventListener('drop',e=>{e.preventDefault();s.classList.remove('over');drop(e.dataTransfer.getData('text/plain'),s)})})}
function touchDrag(e){if(e.pointerType==='mouse')return;const el=e.currentTarget,ghost=el.querySelector('img').cloneNode();ghost.className='drag-ghost';document.body.appendChild(ghost);el.setPointerCapture(e.pointerId);const move=p=>{ghost.style.left=p.clientX+'px';ghost.style.top=p.clientY+'px';$$('.slot').forEach(s=>s.classList.remove('over'));document.elementFromPoint(p.clientX,p.clientY)?.closest('.slot')?.classList.add('over')};move(e);const end=p=>{const slot=document.elementFromPoint(p.clientX,p.clientY)?.closest('.slot');if(slot)drop(el.dataset.id,slot);$$('.slot').forEach(s=>s.classList.remove('over'));ghost.remove();el.removeEventListener('pointermove',move);el.removeEventListener('pointerup',end);el.removeEventListener('pointercancel',end)};el.addEventListener('pointermove',move);el.addEventListener('pointerup',end);el.addEventListener('pointercancel',end)}
function victory(){const start=Number(localStorage.getItem('adventure_start'))||Date.now(),sec=Math.max(0,Math.floor((Date.now()-start)/1000));$('#time').textContent=`總探索時長：${String(Math.floor(sec/60)).padStart(2,'0')} 分 ${String(sec%60).padStart(2,'0')} 秒`;$('#door').style.display='none';$('#victory').classList.add('show')}
function restart(){localStorage.clear();sessionStorage.clear();location.reload()}
function showHome(){sessionStorage.removeItem('map_cover_seen');$('#cover').style.display='grid';requestAnimationFrame(()=>$('#cover').classList.remove('hide'))}
$('#cover').onclick=dismissCover;$('#cover').onkeydown=e=>{if(e.key==='Enter'||e.key===' ')dismissCover()};$$('.character-card').forEach(c=>c.onclick=()=>selectCharacter(c.dataset.character));$('#avatar').onclick=showCharacterSelect;$('#challenge').onclick=activateNearby;$('#home').onclick=showHome;$('#sound').onclick=e=>{e.currentTarget.textContent=e.currentTarget.textContent.includes('🔊')?'🔇 音效':'🔊 音效'};$('#close').onclick=()=>$('#modal').classList.remove('open');$('#modal').onclick=e=>{if(e.target===$('#modal'))$('#modal').classList.remove('open')};$('#again').onclick=restart;$('#enterConsult').onclick=()=>location.href='../全方位醫療資訊站/index.html';
function init(){if(!localStorage.getItem('adventure_start'))localStorage.setItem('adventure_start',Date.now());if(sessionStorage.getItem('map_cover_seen')){$('#cover').style.display='none';if(!selectedCharacter)showCharacterSelect()}applyCharacter();updateHUD();$('#mapImage').addEventListener('load',()=>{buildMarkers();detectNearby()});if($('#mapImage').complete){buildMarkers();detectNearby()}window.addEventListener('resize',updateMarkerSizes);requestAnimationFrame(moveLoop)}init();
</script></body></html>
