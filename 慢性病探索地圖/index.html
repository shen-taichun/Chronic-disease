<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>慢性病探索地圖</title>
<style>
:root{--ink:#2f3b50;--navy:#294c70;--mint:#61c9a6;--green:#3db67a;--red:#de6670;--paper:#fffdf8}*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;color:var(--ink)}body{background:#172a27;overflow-x:hidden}.cover{position:fixed;inset:0;z-index:1000;display:grid;place-items:center;background:#183b32;cursor:pointer;transition:opacity .55s ease}.cover.hide{opacity:0;pointer-events:none}.cover img{display:block;width:100%;height:100%;object-fit:cover}.cover-hint{position:absolute;left:50%;bottom:5%;transform:translateX(-50%);padding:11px 20px;border-radius:99px;background:#1d3348d9;color:#fff;font-size:clamp(14px,2vw,19px);font-weight:1000;letter-spacing:1px;box-shadow:0 6px 0 #12223399;animation:pulse 1.3s ease-in-out infinite alternate}@keyframes pulse{to{transform:translateX(-50%) translateY(-5px);box-shadow:0 10px 0 #12223377}}
.map-screen{min-height:100vh;display:grid;place-items:center;padding:12px;background:radial-gradient(circle,#36584d,#152a27)}.map-frame{position:relative;display:inline-block;line-height:0;filter:drop-shadow(0 18px 36px #0008)}.map-image{display:block;width:auto;height:auto;max-width:calc(100vw - 24px);max-height:calc(100vh - 24px);object-fit:contain}.hud{position:fixed;z-index:20;right:18px;top:16px;display:flex;align-items:center;gap:10px;padding:10px;border:3px solid #fff;border-radius:18px;background:#fffdf1e8;box-shadow:0 7px 0 #5f4936aa,0 12px 25px #0004;line-height:1.2;backdrop-filter:blur(5px)}.held{padding:8px 12px;border-radius:12px;background:#e4f7ec;color:#236b4f;font-weight:1000;white-space:nowrap}.clear{border:0;padding:8px 11px;border-radius:11px;background:#314d66;color:#fff;font:inherit;font-weight:900;cursor:pointer;white-space:nowrap}.hotspot{position:absolute;z-index:5;border:2px solid transparent;border-radius:17px;cursor:pointer;line-height:normal;outline:none;transition:.18s}.hotspot:hover,.hotspot:focus-visible{background:#fff6b52b;border-color:#fff3a8;box-shadow:0 0 12px 5px #fff0a966,inset 0 0 16px #fff6bf55;transform:scale(1.04)}.hotspot:active{transform:scale(.98)}.stamp{position:absolute;right:-13px;top:-22px;width:35px;height:35px;display:grid;place-items:center;border:4px solid #fff;border-radius:50%;background:var(--green);color:#fff;font-size:22px;font-weight:1000;line-height:1;box-shadow:0 4px 0 #24754f,0 6px 12px #0004;transform:rotate(-9deg)}
/* 百分比皆以 1680 × 941 原始地圖為基準，熱區只覆蓋既有名牌 */
.heart{left:39.7%;top:31.4%;width:8.8%;height:6.8%}.cancer{left:67.7%;top:33.0%;width:8.7%;height:7.5%}.stroke{left:19.2%;top:59.0%;width:10.2%;height:7.1%}.diabetes{left:70.6%;top:55.9%;width:11.4%;height:7.7%}.kidney{left:27.0%;top:79.3%;width:9.9%;height:7.4%}.consult{left:66.5%;top:80.4%;width:12.3%;height:7.7%}
.modal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:22px;background:#14263cbd;backdrop-filter:blur(8px);line-height:normal}.modal.open{display:flex;animation:fade .22s}@keyframes fade{from{opacity:0}}.panel{position:relative;width:min(980px,100%);max-height:92vh;overflow:auto;padding:31px;border:5px solid #fff;border-radius:32px;background:var(--paper);box-shadow:0 13px 0 #91aab2,0 28px 70px #10203066}.close{position:absolute;z-index:2;right:16px;top:14px;width:41px;height:41px;border:0;border-radius:50%;background:#e9f0f1;color:#667482;font-size:24px;cursor:pointer}.panel-head{text-align:center}.panel-head h2{font-size:32px;margin:0 0 7px}.panel-head p{margin:0;color:#687586}.slots{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:25px 0}.slot{min-height:145px;padding:12px 7px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:3px dashed #b9c9ce;border-radius:18px;background:#edf3f4;color:#687684;transition:.15s}.slot strong{font-size:13px;margin-bottom:8px}.hole{width:68px;height:68px;display:grid;place-items:center;border-radius:50%;background:#d7e1e3;box-shadow:inset 0 5px 7px #73889233;color:#87959b;font-size:27px}.slot.over{border-color:#4aa5cc;background:#e9f7fc}.slot.correct{border-style:solid;border-color:#61c79f;background:#e3f8ee;color:#247259}.slot.wrong{animation:wrong .38s;background:#ffe4e7;border-color:var(--red)}@keyframes wrong{25%,75%{transform:translateX(-7px)}50%{transform:translateX(7px)}}.bag{padding:19px;border-radius:21px;background:#f7f1df;border:3px solid #ead79e}.bag h3{margin:0 0 13px}.badges{display:flex;gap:14px;flex-wrap:wrap;min-height:105px}.credential{width:92px;touch-action:none;user-select:none;cursor:grab;text-align:center;font-size:11px;font-weight:900;color:#4c5868}.credential img{display:block;width:76px;height:76px;margin:0 auto 5px;object-fit:cover;border:5px solid #fff;border-radius:50%;box-shadow:0 5px 0 #afbdbe}.credential.dragging{opacity:.45}.credential.placed{display:none}.empty{color:#7e847f;padding:20px}.door-progress{text-align:center;margin-top:18px;font-weight:900;color:#627082}.door-progress b{color:#238369;font-size:20px}.victory{display:none;text-align:center;padding:12px}.victory.show{display:block;animation:pop .55s cubic-bezier(.2,.9,.25,1.2)}@keyframes pop{from{opacity:0;transform:scale(.75)}}.trophy{display:block;font-size:85px}.victory h2{font-size:38px;margin:5px 0}.victory p{font-size:17px;color:#657283}.time{display:inline-block;margin:12px;padding:10px 16px;border-radius:99px;background:#e4f7ef;color:#246d59;font-weight:1000}.victory-actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:17px}.btn{border:0;padding:13px 21px;border-radius:15px;font:inherit;font-weight:1000;cursor:pointer}.enter{background:var(--green);color:#fff;box-shadow:0 5px 0 #287e58}.again{background:#fff0c8;color:#765c1e;box-shadow:0 5px 0 #ddc26e}.drag-ghost{position:fixed;z-index:999;pointer-events:none;width:78px;height:78px;object-fit:cover;border:5px solid #fff;border-radius:50%;box-shadow:0 10px 25px #0005;transform:translate(-50%,-50%)}
@media(max-width:760px){.map-screen{padding:5px}.map-image{max-width:calc(100vw - 10px);max-height:calc(100vh - 10px)}.hud{right:8px;top:8px;padding:7px;gap:6px;font-size:13px}.held,.clear{padding:7px 9px}.slots{grid-template-columns:repeat(3,1fr)}.panel{padding:26px 17px}.stamp{width:28px;height:28px;font-size:17px;right:-10px;top:-18px}}@media(max-width:500px){.slots{grid-template-columns:1fr 1fr}.slot{min-height:125px}.panel{border-radius:24px}.panel-head h2{font-size:27px}.cover-hint{white-space:nowrap}}@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition:none!important}}
</style></head><body>
<div class="cover" id="cover" role="button" tabindex="0" aria-label="點擊進入慢性病探索地圖"><img src="cover.png" alt="慢性病探索遊戲封面"><span class="cover-hint">點擊任何位置開始冒險</span></div>
<main class="map-screen"><div class="map-frame" id="mapFrame"><img class="map-image" src="map-bg.png" alt="慢性病探索地圖，包含五個疾病關卡及全方位醫療諮詢站">
<div class="hotspot cancer" data-id="cancer" role="link" tabindex="0" aria-label="前往癌症治療中心"></div><div class="hotspot heart" data-id="heart" role="link" tabindex="0" aria-label="前往心臟疾病康復中心"></div><div class="hotspot stroke" data-id="stroke" role="link" tabindex="0" aria-label="前往腦中風康復病院"></div><div class="hotspot diabetes" data-id="diabetes" role="link" tabindex="0" aria-label="前往糖尿病代謝研究中心"></div><div class="hotspot kidney" data-id="kidney" role="link" tabindex="0" aria-label="前往腎臟病診療中心"></div><div class="hotspot consult" data-id="consult" role="button" tabindex="0" aria-label="開啟全方位醫療諮詢站通關大門"></div>
</div></main><aside class="hud"><span class="held" id="held">持有 0 / 5</span><button class="clear" id="clear">🔄 清除進度</button></aside>
<div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="doorTitle"><div class="panel"><button class="close" id="close" aria-label="關閉">×</button><div id="door"><div class="panel-head"><h2 id="doorTitle">🚪 健康諮詢大門</h2><p>集滿 5 枚徽章，並將它們拖曳到對應凹槽即可開門。</p></div><div class="slots" id="slots"></div><div class="bag"><h3>🎒 我的徽章背包</h3><div class="badges" id="bag"></div></div><div class="door-progress">已正確放入：<b id="matched">0</b> / 5</div></div><div class="victory" id="victory"><span class="trophy">🏆</span><h2>開啟健康評估！</h2><p>五枚徽章已經喚醒健康諮詢大門！</p><span class="time" id="time">總探索時長：00 分 00 秒</span><div class="victory-actions"><button class="btn enter" id="enter">進入全方位諮詢站</button><button class="btn again" id="again">再次冒險</button></div></div></div></div>
<script>
const LEVELS=[
{id:'cancer',name:'癌症',href:'../癌症主題館/index.html',badge:'防癌偵查徽章',img:'../癌症主題館/防癌偵查徽章.png'},
{id:'heart',name:'心臟病',href:'../心臟病主題館/index.html',badge:'護心行動徽章',img:'../心臟病主題館/護心行動徽章.png'},
{id:'stroke',name:'腦中風',href:'../腦中風主題館/index.html',badge:'黃金救援徽章',img:'../腦中風主題館/黃金救援徽章.png'},
{id:'diabetes',name:'糖尿病',href:'../糖尿病主題館/index.html',badge:'穩糖生活徽章',img:'../糖尿病主題館/穩糖生活徽章.png'},
{id:'kidney',name:'腎臟病',href:'../腎臟病主題館/index.html',badge:'護腎守門徽章',img:'../腎臟病主題館/護腎守門徽章.png'}];
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];let state={},placed=new Set();
function readState(){try{state=JSON.parse(localStorage.getItem('cert_dynasty')||'{}')||{}}catch{state={}}}
function init(){readState();if(!localStorage.getItem('adventure_start'))localStorage.setItem('adventure_start',Date.now());if(sessionStorage.getItem('map_cover_seen'))$('#cover').style.display='none';render()}
function dismissCover(){if($('#cover').classList.contains('hide'))return;sessionStorage.setItem('map_cover_seen','1');$('#cover').classList.add('hide');setTimeout(()=>$('#cover').style.display='none',580)}
function render(){const held=LEVELS.filter(x=>state[x.id]).length;$('#held').textContent=`持有 ${held} / 5`;$$('.hotspot').forEach(zone=>{zone.querySelector('.stamp')?.remove();if(zone.dataset.id!=='consult'&&state[zone.dataset.id])zone.insertAdjacentHTML('beforeend','<span class="stamp" aria-label="已完成">✓</span>')})}
function activate(zone){if(zone.dataset.id==='consult')openDoor();else{const level=LEVELS.find(x=>x.id===zone.dataset.id);if(level)location.href=level.href}}
$$('.hotspot').forEach(zone=>{zone.addEventListener('click',()=>activate(zone));zone.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();activate(zone)}})});
function openDoor(){placed.clear();$('#door').style.display='block';$('#victory').classList.remove('show');$('#matched').textContent='0';$('#slots').innerHTML=LEVELS.map(x=>`<div class="slot" data-slot="${x.id}"><strong>${x.name}</strong><div class="hole">?</div></div>`).join('');const owned=LEVELS.filter(x=>state[x.id]);$('#bag').innerHTML=owned.length?owned.map(x=>`<div class="credential" draggable="true" data-id="${x.id}"><img src="${x.img}" alt="${x.badge}"><span>${x.badge}</span></div>`).join(''):'<span class="empty">背包目前是空的，先去探索疾病關卡吧！</span>';bindDrag();$('#modal').classList.add('open')}
function drop(id,slot){const target=LEVELS.find(x=>x.id===id);if(!target||placed.has(id))return;if(slot.dataset.slot===id){placed.add(id);slot.classList.add('correct');slot.innerHTML=`<strong>${target.name}</strong><img src="${target.img}" alt="${target.badge}" style="width:72px;height:72px;object-fit:cover;border-radius:50%;border:4px solid white">`;document.querySelector(`.credential[data-id="${id}"]`)?.classList.add('placed');$('#matched').textContent=placed.size;if(placed.size===5)setTimeout(victory,550)}else{slot.classList.add('wrong');setTimeout(()=>slot.classList.remove('wrong'),420)}}
function bindDrag(){$$('.credential').forEach(el=>{el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',el.dataset.id);el.classList.add('dragging')});el.addEventListener('dragend',()=>el.classList.remove('dragging'));el.addEventListener('pointerdown',touchStart)});$$('.slot').forEach(s=>{s.addEventListener('dragover',e=>{e.preventDefault();s.classList.add('over')});s.addEventListener('dragleave',()=>s.classList.remove('over'));s.addEventListener('drop',e=>{e.preventDefault();s.classList.remove('over');drop(e.dataTransfer.getData('text/plain'),s)})})}
function touchStart(e){if(e.pointerType==='mouse')return;const el=e.currentTarget,ghost=el.querySelector('img').cloneNode();ghost.className='drag-ghost';document.body.appendChild(ghost);el.setPointerCapture(e.pointerId);el.classList.add('dragging');const move=p=>{ghost.style.left=p.clientX+'px';ghost.style.top=p.clientY+'px';$$('.slot').forEach(s=>s.classList.remove('over'));document.elementFromPoint(p.clientX,p.clientY)?.closest('.slot')?.classList.add('over')};move(e);const end=p=>{const slot=document.elementFromPoint(p.clientX,p.clientY)?.closest('.slot');$$('.slot').forEach(s=>s.classList.remove('over'));if(slot)drop(el.dataset.id,slot);ghost.remove();el.classList.remove('dragging');el.removeEventListener('pointermove',move);el.removeEventListener('pointerup',end);el.removeEventListener('pointercancel',end)};el.addEventListener('pointermove',move);el.addEventListener('pointerup',end);el.addEventListener('pointercancel',end)}
function victory(){const start=Number(localStorage.getItem('adventure_start'))||Date.now(),sec=Math.max(0,Math.floor((Date.now()-start)/1000));$('#time').textContent=`總探索時長：${String(Math.floor(sec/60)).padStart(2,'0')} 分 ${String(sec%60).padStart(2,'0')} 秒`;$('#door').style.display='none';$('#victory').classList.add('show')}
function clearProgress(){if(confirm('確定要清除五個關卡的徽章進度嗎？')){localStorage.clear();localStorage.setItem('adventure_start',Date.now());state={};render()}}
function restart(){localStorage.clear();sessionStorage.clear();location.reload()}
$('#cover').addEventListener('click',dismissCover);$('#cover').addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')dismissCover()});$('#clear').onclick=clearProgress;$('#close').onclick=()=>$('#modal').classList.remove('open');$('#modal').onclick=e=>{if(e.target===$('#modal'))$('#modal').classList.remove('open')};$('#again').onclick=restart;$('#enter').onclick=()=>location.href='../全方位醫療資訊站/index.html';document.addEventListener('keydown',e=>{if(e.key==='Escape')$('#modal').classList.remove('open')});init();
</script></body></html>
