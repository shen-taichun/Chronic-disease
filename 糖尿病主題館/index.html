<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>糖尿病主題館｜知識闖關</title>
<style>
:root{--main:#6752c7;--dark:#463690;--light:#eee9ff;--accent:#ff799f;--mint:#63d8af;--ink:#353349}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;overflow-x:hidden;color:var(--ink);font-family:"Microsoft JhengHei",sans-serif;background:radial-gradient(circle at 12% 16%,#fff 0 5%,transparent 5.5%),radial-gradient(circle at 90% 12%,var(--light) 0 8%,transparent 8.5%),linear-gradient(145deg,#fffbe8,#ffedbd)}body:before,body:after{content:"";position:fixed;z-index:-1;border-radius:48% 52%;filter:drop-shadow(0 10px 0 #7d653322)}body:before{width:220px;height:180px;left:-70px;bottom:-35px;background:#83dfbe}body:after{width:180px;height:160px;right:-45px;bottom:6%;background:#c5b7ff}main{width:min(92vw,780px);padding:28px 0}.card{background:#fffdf8;border:4px solid #fff;border-radius:34px;padding:clamp(22px,5vw,42px);box-shadow:0 12px 0 #e3c575,0 20px 38px #58411a29}.hidden{display:none!important}.badge{display:inline-flex;align-items:center;gap:8px;padding:8px 15px;border-radius:999px;background:var(--light);color:var(--dark);font-weight:900}.dot{width:24px;height:24px;border-radius:55% 45%;background:var(--main);box-shadow:inset 5px 5px 0 #ffffff40}button{border:0;font:inherit;cursor:pointer}.primary{padding:14px 28px;border-radius:18px;background:var(--main);color:#fff;font-size:18px;font-weight:900;box-shadow:0 6px 0 var(--dark);transition:.12s}.primary:hover{transform:translateY(-2px)}.primary:active{transform:translateY(4px);box-shadow:0 2px 0 var(--dark)}.loading{text-align:center;font-weight:900;color:#6d657b}.loader{width:58px;height:58px;margin:22px auto;border:9px solid var(--light);border-top-color:var(--main);border-radius:46% 54%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.story-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:18px}.story-head strong{font-size:14px;color:#777080}.story-scene{display:grid;grid-template-columns:.8fr 1.2fr;overflow:hidden;border:4px solid var(--light);border-radius:26px;background:#f8fbff;box-shadow:0 7px 0 #ddd6ed}.patient{min-height:310px;display:grid;place-items:center;background:linear-gradient(150deg,var(--light),#d9f4ff);font-size:118px;text-shadow:0 8px 0 #55489925}.speech{position:relative;display:flex;align-items:center;margin:0;padding:25px;background:#fffdf8;font-size:clamp(15px,2.2vw,18px);font-weight:800;line-height:1.75}.speech:before{content:"";position:absolute;left:-18px;top:45%;border-width:12px 18px 12px 0;border-style:solid;border-color:transparent #fffdf8 transparent transparent}.story-action{text-align:center;margin-top:22px}.story-action>p{font-weight:800;color:#70687d}.source{font-size:13px!important;font-weight:400!important;color:#918a98!important;margin-top:17px}.topline{display:flex;align-items:center;gap:14px;margin-bottom:20px}.counter{font-weight:900}.progress{flex:1;height:15px;border-radius:99px;background:#eee7dc;overflow:hidden}.progress i{display:block;width:0;height:100%;background:linear-gradient(90deg,var(--mint),#a6e987);transition:.3s}.question{font-size:clamp(21px,4vw,29px);line-height:1.5;margin:12px 0 22px}.options{display:grid;gap:13px}.option{text-align:left;padding:15px 18px;border:3px solid #e8e0f3;border-radius:18px;background:#fff;color:var(--ink);font-weight:800;line-height:1.45;box-shadow:0 5px 0 #ded4e9;transition:.14s}.option:hover{border-color:var(--main);transform:translateY(-2px)}.option.correct{background:#def7df;border-color:#55bf72}.option.wrong{background:#ffe1e4;border-color:#ec6e78}.result{text-align:center}.award{width:min(62vw,280px);aspect-ratio:1;margin:0 auto 10px;display:grid;place-items:center;border:12px solid #f1dfac;border-radius:50%;background:radial-gradient(circle,#fff 0 25%,var(--light) 26% 56%,var(--main) 57%);box-shadow:0 12px 0 var(--dark),0 20px 30px #26305030;animation:pop .65s cubic-bezier(.2,.9,.25,1.25)}.award span{font-size:82px;filter:drop-shadow(0 6px 0 #0002)}.award b{position:absolute;margin-top:195px;padding:7px 17px;border-radius:99px;background:#fff8df;color:var(--dark);font-size:18px}.emoji{display:block;font-size:78px}.result h2{font-size:clamp(31px,6vw,47px);margin:10px}.result p{font-size:18px;line-height:1.7}@keyframes pop{from{opacity:0;transform:scale(.55) rotate(-12deg)}}.flash{animation:green .2s}@keyframes green{50%{background:#89efa0}}.shake{animation:shake .3s}@keyframes shake{25%,75%{transform:translateX(-9px)}50%{transform:translateX(9px)}}
@media(max-width:620px){main{padding:14px 0}.card{padding:20px;border-radius:25px}.story-head{align-items:flex-start}.story-scene{display:block}.patient{min-height:210px;font-size:92px}.speech{padding:18px}.speech:before{left:38px;top:-18px;border-width:0 12px 18px;border-color:transparent transparent #fffdf8}.option{padding:13px 14px}}@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition:none!important}}
:root{--main:#df8c32;--dark:#a7601e;--light:#fff0d6}.patient-image{display:block;width:100%;height:310px;object-fit:contain;padding:8px;background:linear-gradient(150deg,var(--light),#d9f4ff)}.award-image{display:block;width:min(68vw,310px);aspect-ratio:1;object-fit:contain;margin:0 auto 12px;border-radius:50%;filter:drop-shadow(0 12px 16px #26305035);animation:pop .65s cubic-bezier(.2,.9,.25,1.25)}@media(max-width:620px){.patient-image{height:240px}}</style></head><body><main><section class="card" id="card" aria-live="polite">
<a href="../慢性病探索地圖/index.html" style="position:fixed;z-index:20;left:16px;top:16px;padding:10px 14px;border-radius:14px;background:#fff;color:var(--dark);text-decoration:none;font-weight:900;box-shadow:0 5px 0 #c7ccd8">← 回到慢性病探索地圖</a>
<div id="loading" class="loading"><div class="loader"></div><p>正在整理糖尿病知識題庫⋯</p></div>
<div id="story" class="hidden"><div class="story-head"><div class="badge"><i class="dot"></i>糖尿病主題館</div><strong>一位患者的心聲</strong></div><div class="story-scene"><img class="patient-image" src="糖尿病患者.png" alt="糖尿病患者"><blockquote class="speech">「最近一直覺得口很渴，一天喝好多水還是不夠，而且一直吃東西，可是體重反而慢慢變輕。我還發現傷口好像好得特別慢，小擦傷拖了很久都沒好。」</blockquote></div><div class="story-action"><p>認識三多一少，從了解糖尿病開始。</p><button class="primary" id="storyStart">開始答題</button><p class="source" id="source"></p></div></div>
<div id="game" class="hidden"><div class="topline"><span class="counter" id="counter"></span><div class="progress"><i id="bar"></i></div></div><div class="badge">🩸 糖尿病知識</div><h2 class="question" id="question"></h2><div class="options" id="options"></div></div>
<div id="result" class="result hidden"><img class="award-image hidden" id="award" src="穩糖生活徽章.png" alt="穩糖生活徽章"><span class="emoji" id="emoji">🌱</span><h2 id="resultTitle"></h2><p id="resultText"></p><button class="primary" id="again"></button></div>
</section></main><script>
const CONFIG={topic:'糖尿病',icon:'🩸',title:'糖尿病主題館',award:'穩糖生活徽章'};const URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vT7jnociHlwn8P95es4fx91U-8g5iwm98He97QhpXxEU89xgA_7VU9PgMBSQ32LF9ws9H0QERKWz0Vw/pub?output=csv';
const fallback=[['糖尿病常見的「三多一少」不包含哪項？','睡眠變多','吃得多','喝得多','尿得多'],['糖尿病患者的傷口為何要特別留意？','可能癒合較慢且容易感染','一定一天內痊癒','不需要清潔','只要貼膠帶即可'],['控制血糖應採取什麼方式？','遵從醫囑並配合飲食與運動','自行停藥','只吃甜食','完全不做檢查'],['口渴、多尿又體重下降時應？','就醫檢查血糖','只喝含糖飲料','忽略症狀','自行買偏方'],['保護足部的適當做法是？','每天檢查有無傷口','赤腳走路','用很燙的水泡腳','忽略小傷口'],['規律監測血糖的目的為何？','了解控制情形並調整照護','保證可以任意吃甜食','取代所有回診','只為記錄體重']].map((x,i)=>({id:'f'+i,q:x[0],correct:x[1],options:x.slice(1)}));
const $=s=>document.querySelector(s),card=$('#card');let bank=[],round=[],index=0,retained=null,offline=false;
function csv(t){let rows=[],r=[],f='',q=false;for(let i=0;i<t.length;i++){let c=t[i];if(c==='"'){if(q&&t[i+1]==='"'){f+='"';i++}else q=!q}else if(c===','&&!q){r.push(f);f=''}else if((c==='\n'||c==='\r')&&!q){if(c==='\r'&&t[i+1]==='\n')i++;r.push(f);if(r.some(v=>v.trim()))rows.push(r);r=[];f=''}else f+=c}r.push(f);if(r.some(v=>v.trim()))rows.push(r);return rows}const clean=v=>(v||'').replace(/^\uFEFF/,'').trim();
function parse(t){let rs=csv(t),h=rs[0].map(clean),p=n=>h.indexOf(n),ti=p('主題'),qi=p('題目'),ai=p('A');if([ti,qi,ai].includes(-1))throw Error('格式錯誤');return rs.slice(1).filter(r=>clean(r[ti])===CONFIG.topic).map((r,i)=>{let o=[r[ai],r[p('B')],r[p('C')],r[p('D')]].map(clean).filter(v=>v&&v!=='空');return{id:'s'+i,q:clean(r[qi]),correct:clean(r[ai]),options:o}}).filter(x=>x.q&&x.correct&&x.options.length>1)}
function shuffle(a){a=[...a];for(let i=a.length-1;i;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function show(id){['loading','story','game','result'].forEach(x=>$('#'+x).classList.toggle('hidden',x!==id))}
function start(){let first=retained?[retained]:[],other=bank.filter(q=>!retained||q.id!==retained.id);round=shuffle([...first,...shuffle(other).slice(0,5-first.length)]).slice(0,5);if(round.length<5)round.push(...fallback.filter(f=>!round.some(q=>q.q===f.q)).slice(0,5-round.length));index=0;show('game');render()}
function render(){let q=round[index];$('#counter').textContent=`第 ${index+1} / 5 題`;$('#bar').style.width=`${index*20}%`;$('#question').textContent=q.q;let box=$('#options');box.innerHTML='';shuffle(q.options).forEach(a=>{let b=document.createElement('button');b.className='option';b.textContent=a;b.onclick=()=>answer(b,a,q);box.appendChild(b)})}
function answer(b,a,q){document.querySelectorAll('.option').forEach(x=>x.disabled=true);if(a===q.correct){b.classList.add('correct');card.classList.add('flash');setTimeout(()=>card.classList.remove('flash'),200);$('#bar').style.width=`${(index+1)*20}%`;setTimeout(()=>{index++;index===5?finish(true):render()},430)}else{b.classList.add('wrong');[...document.querySelectorAll('.option')].find(x=>x.textContent===q.correct)?.classList.add('correct');card.classList.add('shake');setTimeout(()=>card.classList.remove('shake'),300);retained=q;setTimeout(()=>finish(false),650)}}
function finish(win){show('result');$('#award').classList.toggle('hidden',!win);$('#emoji').classList.toggle('hidden',win);$('#resultTitle').textContent=win?'闖關成功！':'再挑戰一次！';$('#resultText').textContent=win?`恭喜獲得「${CONFIG.award}」！五題全答對，你已完成${CONFIG.title}！`:'剛才答錯的題目會保留，再搭配其他隨機題目組成新的五題。';$('#again').textContent=win?'再玩一次':'重新挑戰';if(win){retained=null;saveCertificate('diabetes')}}
function saveCertificate(id){let s={};try{s=JSON.parse(localStorage.getItem('cert_dynasty')||'{}')||{}}catch(e){}s[id]=true;localStorage.setItem('cert_dynasty',JSON.stringify(s));localStorage.setItem('cert_idiom',Object.values(s).filter(Boolean).length);localStorage.setItem('cert_warrior',id)}
$('#storyStart').onclick=start;$('#again').onclick=start;(async()=>{try{let r=await fetch(URL,{cache:'no-store'});if(!r.ok)throw Error(r.status);bank=parse(await r.text());if(bank.length<5)throw Error('題目不足')}catch(e){console.warn(e);bank=fallback;offline=true}$('#source').textContent=offline?'目前使用內建範例題庫（線上題庫暫時無法讀取）':`已載入線上題庫，共 ${bank.length} 題${CONFIG.topic}知識題`;setTimeout(()=>show('story'),350)})();
</script></body></html>
